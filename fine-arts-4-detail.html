<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Arts Project 4 - Connor's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body[data-page="fine-arts"] {
            padding-top: calc(88px + 64px);
            background: #fafaf8;
        }
        
        body[data-page="fine-arts"] .category-bar {
            top: 88px !important;
            position: fixed !important;
            z-index: 1002 !important;
        }

        .project-header {
            padding: 60px 40px 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .project-header p {
            font-size: 18px;
            color: #666;
            margin: 0;
        }

        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            margin: 40px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: #333;
        }

        .project-gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            background: #fafaf8;
        }

        .gallery-hero {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .gallery-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.08);
            background: #fff;
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        /* Tablet breakpoint */
        @media (max-width: 1024px) {
            .project-header {
                padding: 50px 30px 30px;
            }

            .project-header h1 {
                font-size: 40px;
            }

            .project-header p {
                font-size: 16px;
            }

            .project-gallery {
                padding: 30px;
                gap: 20px;
            }
        }

        /* Mobile: single column stack */
        @media (max-width: 768px) {
            body[data-page="fine-arts"] {
                padding-top: calc(88px + 56px);
            }

            .project-header {
                padding: 40px 20px 20px;
            }

            .project-header h1 {
                font-size: 32px;
            }

            .project-header p {
                font-size: 16px;
            }

            .project-gallery {
                padding: 20px;
            }

            .gallery-hero {
                aspect-ratio: 1;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        /* Extra small phones */
        @media (max-width: 480px) {
            body[data-page="fine-arts"] {
                padding-top: calc(88px + 48px);
            }

            .project-header {
                padding: 30px 16px 16px;
            }

            .project-header h1 {
                font-size: 24px;
                margin: 0 0 8px 0;
            }

            .project-header p {
                font-size: 14px;
            }

            .project-gallery {
                padding: 16px;
                gap: 14px;
            }

            .gallery-hero {
                aspect-ratio: 1;
                max-width: 100%;
                border-radius: 4px;
            }
        }
    </style>
</head>
<body data-page="fine-arts">
    <header class="site-header">
        <div class="header-inner container">
            <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
            <nav class="header-nav">
                <a href="about.html" class="nav-about" title="Details">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10.5"/>
                        <circle cx="12" cy="8" r="1.5"/>
                        <path d="M12 11v6"/>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
        <a href="portfolio-wheel.html#industrial-design" data-category="industrial-design">Industrial Design</a>
        <a href="portfolio-wheel.html#engineering" data-category="engineering">Engineering</a>
        <a href="portfolio-wheel.html#fabrication" data-category="fabrication">Fabrication</a>
        <a href="portfolio-wheel.html#fine-arts" data-category="fine-arts">Fine Arts</a>
    </nav>

    <div class="project-header">
        <h1>Paintings</h1>
        <p>Acrylic and mixed media compositions</p>
    </div>

    <div class="project-gallery">
        <div class="gallery-hero">
            <img src="assets/images/paintings/1000016900.jpg" alt="Painting hero">
        </div>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="assets/images/paintings/1000016904.jpg" alt="Painting 2"></div>
            <div class="gallery-item"><img src="assets/images/paintings/1000016907.jpg" alt="Painting 3"></div>
            <div class="gallery-item"><img src="assets/images/paintings/1000016911.jpg" alt="Painting 4"></div>
            <div class="gallery-item"><img src="assets/images/paintings/1000016913.jpg" alt="Painting 5"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
