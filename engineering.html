    <script src="script.js"></script>
    <script>
    (function(){
      const colors=['#e11a1a','#ffd400','#0066ff'];
      let idx=0;
      function applyNext(el){ el.style.color = colors[idx]; idx=(idx+1)%colors.length; }
      function reset(el){ el.style.color = ''; }
      document.addEventListener('DOMContentLoaded', () => {
        const link = document.querySelector('.site-name a');
        if(!link) return;
        link.style.cursor='pointer';
        link.addEventListener('mouseenter', ()=> applyNext(link));
        link.addEventListener('focus', ()=> applyNext(link));
        link.addEventListener('mouseleave', ()=> reset(link));
        link.addEventListener('blur', ()=> reset(link));
      });
    })();
    </script>
