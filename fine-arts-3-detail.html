<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Arts Project 3 - Connor's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body[data-page="fine-arts"] {
            padding-top: calc(88px + 64px);
            background: #fafaf8;
        }
        
        body[data-page="fine-arts"] .category-bar {
            top: 88px !important;
            position: fixed !important;
            z-index: 1002 !important;
        }

        .project-header {
            padding: 60px 40px 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .project-header p {
            font-size: 18px;
            color: #666;
            margin: 0;
        }

        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            margin: 40px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: #333;
        }

        .project-gallery {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            padding: 80px 40px;
            background: #fafaf8;
        }

        .gallery-hero {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .gallery-item {
            display: none;
        }

        @media (max-width: 768px) {
            .project-gallery {
                min-height: auto;
                padding: 40px 20px;
            }

            .gallery-hero {
                aspect-ratio: 1;
            }

            .project-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body data-page="fine-arts">
    <header class="site-header">
        <div class="header-inner container">
            <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
            <nav class="header-nav">
                <a href="about.html" class="nav-about" title="Details">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10.5"/>
                        <circle cx="12" cy="8" r="1.5"/>
                        <path d="M12 11v6"/>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
        <a href="portfolio-wheel.html#industrial-design">Industrial Design</a>
        <a href="portfolio-wheel.html#engineering">Engineering</a>
        <a href="portfolio-wheel.html#fabrication">Fabrication</a>
        <a href="portfolio-wheel.html#fine-arts">Fine Arts</a>
    </nav>

    <div class="project-header">
        <a href="portfolio-wheel.html#fine-arts" class="back-link">← Back to Fine Arts</a>
        <h1>Fine Arts Project 3</h1>
        <p>Artistic exploration</p>
    </div>

    <div class="project-gallery">
        <div class="gallery-hero"></div>
    </div>

    <script src="script.js"></script>

</body>
