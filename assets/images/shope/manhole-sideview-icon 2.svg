<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground surface line -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="#4a4a4a" stroke-width="2.5"/>
  
  <!-- Ground fill pattern -->
  <rect x="10" y="100" width="180" height="15" fill="#888" opacity="0.25"/>
  
  <!-- Casting cover/lid (typical cast iron) -->
  <rect x="45" y="75" width="110" height="25" rx="3" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Casting detail lines -->
  <line x1="60" y1="75" x2="60" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
  <line x1="80" y1="75" x2="80" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
  <line x1="100" y1="75" x2="100" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
  <line x1="120" y1="75" x2="120" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
  <line x1="140" y1="75" x2="140" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
  
  <!-- Concrete barrel/shaft walls -->
  <rect x="55" y="100" width="90" height="130" fill="none" stroke="#3a3a3a" stroke-width="2.5"/>
  
  <!-- Barrel interior (lighter) -->
  <rect x="58" y="103" width="84" height="124" fill="#1a1a1a" opacity="0.3"/>
  
  <!-- Incoming pipe/inlet (left side) -->
  <rect x="30" y="150" width="25" height="18" rx="2" fill="none" stroke="#2a2a2a" stroke-width="2.2"/>
  <line x1="30" y1="159" x2="55" y2="159" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Outgoing pipe/outlet (bottom) -->
  <circle cx="100" cy="235" r="6" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="100" y1="229" x2="100" y2="235" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Internal inverted sump cone (typical in manholes) -->
  <polygon points="58,220 142,220 100,235" fill="none" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Water level line -->
  <line x1="60" y1="185" x2="140" y2="185" stroke="#5B8FD4" stroke-width="2" opacity="0.75"/>
  
  <!-- Depth marking lines -->
  <line x1="48" y1="130" x2="52" y2="130" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="160" x2="52" y2="160" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="190" x2="52" y2="190" stroke="#666" stroke-width="1" opacity="0.5"/>
  
  <!-- Top label -->
  <text x="100" y="65" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">STORM MANHOLE</text>
</svg>
