<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer cast iron cover circle -->
  <circle cx="200" cy="200" r="150" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Radial grid pattern for cast iron texture -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#555" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#555" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="200" r="115" fill="none" stroke="#555" stroke-width="1" opacity="0.3"/>
  
  <!-- Radial lines for grating/grip pattern -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <line x1="91" y1="91" x2="309" y2="309" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <line x1="309" y1="91" x2="91" y2="309" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Inner opening circle (concrete rim) -->
  <circle cx="200" cy="200" r="100" fill="#2a2a2a" stroke="#555" stroke-width="2"/>
  
  <!-- Access opening (dark) -->
  <circle cx="200" cy="200" r="80" fill="#1a1a1a" stroke="#666" stroke-width="1.5"/>
  
  <!-- Water/flow indicator inside -->
  <circle cx="200" cy="200" r="75" fill="none" stroke="#5B8FD4" stroke-width="2" opacity="0.6"/>
  
  <!-- Drainage direction arrows (subtle) -->
  <g opacity="0.5">
    <path d="M 200 140 L 220 160 L 210 160" fill="none" stroke="#5B8FD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 260 200 L 240 220 L 240 210" fill="none" stroke="#5B8FD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 200 260 L 180 240 L 190 240" fill="none" stroke="#5B8FD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 140 200 L 160 180 L 160 190" fill="none" stroke="#5B8FD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Center label text -->
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5B8FD4" text-anchor="middle" opacity="0.8">STORM</text>
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="14" fill="#5B8FD4" text-anchor="middle" opacity="0.6">MANHOLE</text>
</svg>
