  <link rel="stylesheet" href="styles.css">
  <style>
    .project-gallery { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:40px; max-width:1400px; margin:0 auto; }
    .gallery-item { border-radius:8px; min-height:240px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .gallery-item.placeholder { background:linear-gradient(135deg,#7f7fd5 0%,#86a8e7 55%,#91eae4 100%); color:#fff; font-weight:600; text-align:center; padding:20px; }
    .gallery-item.full-width { grid-column:1 / -1; min-height:320px; }
    .gallery-item.span-2 { grid-column:span 2; min-height:280px; }
    .project-header { padding:60px 40px 40px; text-align:center; }
    .project-header h1 { font-size:48px; margin:0 0 10px; }
    .project-header p { font-size:18px; color:#666; margin:0; }
    .back-link { display:inline-block; padding:10px 20px; background:#000; color:#fff; text-decoration:none; border-radius:4px; margin:40px; }
    @media (max-width:1024px){ .project-gallery{grid-template-columns:repeat(2,1fr); padding:30px;} .gallery-item.span-2{grid-column:span 2;} }
    @media (max-width:768px){ .project-gallery{grid-template-columns:1fr; padding:20px;} .gallery-item.full-width,.gallery-item.span-2{grid-column:1;} }
  </style>
</head>
