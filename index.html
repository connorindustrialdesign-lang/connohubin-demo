<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Hubin — Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      :root {
        --home-header-h: 88px;
        --home-bar-h: 64px;
      }

      body[data-page="home"] {
        background: #fafaf8;
        padding-top: calc(var(--home-header-h) + var(--home-bar-h));
      }

      body[data-page="home"] .category-bar {
        top: var(--home-header-h) !important;
        position: fixed !important;
        z-index: 1002 !important;
      }
      
      .hero-project {
        min-height: calc(100vh - (var(--home-header-h) + var(--home-bar-h)));
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 32px 20px 40px;
      }
      
      .hero-project-wrapper {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 80px;
        align-items: flex-end;
      }
      
      .hero-project-text-button {
        display: flex;
        flex-direction: column;
        width: 100%;
        justify-content: flex-start;
      }
      
      .hero-project-text {
        flex: 0 0 auto;
        margin-bottom: 12px;
        margin-top: 0;
      }
      
      .gallery-caption {
        font-size: 18px;
        color: #444;
        line-height: 1.6;
        font-weight: 700;
        letter-spacing: 1.2px;
        max-width: 500px;
        margin-top: 0;
        margin-bottom: 40px;
      }
      
      .hero-project-button-col {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        margin-top: auto;
        flex: 0 0 auto;
      }
      
      .hero-project-image a {
        display: block;
        text-decoration: none;
        transition: opacity 0.3s ease;
      }
      
      .hero-project-image a:hover {
        opacity: 0.95;
      }
      
      .hero-project-image img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      
      .hero-project-text {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -1.5px;
        color: #1a1a1a;
        line-height: 1.1;
        padding-bottom: 0;
      }
      

      .projects-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 28px 64px;
        background: #1a1a1a;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 0.5px;
        border-radius: 8px;
        transition: background 0.3s ease, transform 0.2s ease;
        border: none;
        cursor: pointer;
        width: fit-content;
        margin-top: 0;
      }
      
      .projects-button:hover {
        background: #333;
        transform: translateY(-2px);
      }
      
      @media (max-width: 1024px) {
        :root {
          --home-header-h: 88px;
          --home-bar-h: 64px;
        }

        .hero-project-wrapper {
          grid-template-columns: 1fr;
          gap: 24px;
          align-items: flex-start;
        }
        
        .hero-project-text {
          font-size: 48px;
          padding-bottom: 0;
        }
        
        .hero-project-button-col {
          justify-content: flex-start;
        }
      }
      
      @media (max-width: 768px) {
        :root {
          --home-header-h: 72px;
          --home-bar-h: 56px;
        }

        .hero-project {
          min-height: auto;
          padding: 20px 16px 24px;
        }

        .hero-project-wrapper {
          gap: 16px;
        }

        .hero-project-image img {
          max-height: 36vh;
          object-fit: cover;
        }
        
        .hero-project-text {
          font-size: 32px;
        }
        
        .gallery-caption {
          font-size: 16px;
          max-width: 100%;
          margin-bottom: 14px;
        }
        
        .projects-button {
          font-size: 16px;
          padding: 16px 36px;
          min-height: 44px;
        }
      }
      
      @media (max-width: 480px) {
        :root {
          --home-header-h: 64px;
          --home-bar-h: 48px;
        }

        .hero-project {
          padding: 16px 12px 18px;
        }

        .hero-project-image img {
          max-height: 32vh;
        }
        
        .hero-project-text {
          font-size: 24px;
          margin-bottom: 8px;
        }
        
        .gallery-caption {
          font-size: 14px;
          line-height: 1.5;
          margin-bottom: 20px;
        }
        
        .projects-button {
          font-size: 14px;
          padding: 14px 28px;
          min-height: 44px;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
        <nav class="header-nav">
          <a href="about.html" class="nav-about" title="Details">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10.5"/>
              <circle cx="12" cy="8" r="1.5"/>
              <path d="M12 11v6"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
      <a href="portfolio-wheel.html#industrial-design" data-category="industrial-design">Industrial Design</a>
      <a href="portfolio-wheel.html#engineering" data-category="engineering">Engineering</a>
      <a href="portfolio-wheel.html#fabrication" data-category="fabrication">Fabrication</a>
      <a href="portfolio-wheel.html#fine-arts" data-category="fine-arts">Fine Arts</a>
    </nav>

    <main>
      <section class="hero-project" aria-label="Featured project">
        <div class="hero-project-wrapper">
          <div class="hero-project-image">
            <a href="project-a-detail.html">
              <img src="assets/images/project-a.jpg" alt="Project A">
            </a>
          </div>
          <div class="hero-project-text-button">
            <div class="hero-project-text">
              CTE Pack
            </div>
            <div class="gallery-caption">Sandeblast 0.5" &amp; 0.25" plywood, zinc fasteners, nylon, and 0.125" cork sheet</div>
            <div class="hero-project-button-col">
              <a href="portfolio-wheel.html#industrial-design" class="projects-button">Portfolio</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Connor Hubin. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
