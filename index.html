    <script src="script.js"></script>
    <script>
    (function(){
      const colors=['#e11a1a','#ffd400','#0066ff'];
      function getIdx(){ try{ return parseInt(localStorage.getItem('colorIdx')||'0',10); }catch{ return 0; } }
      function setIdx(i){ try{ localStorage.setItem('colorIdx',i.toString()); }catch{} }
      function applyNext(el){ const idx=getIdx(); el.style.color=colors[idx]; setIdx((idx+1)%colors.length); }
      function reset(el){ el.style.color=''; }
      document.addEventListener('DOMContentLoaded', () => {
        const link = document.querySelector('.site-name a');
        if(!link) return;
        link.style.cursor='pointer';
        link.addEventListener('mouseenter', ()=> applyNext(link));
        link.addEventListener('focus', ()=> applyNext(link));
        link.addEventListener('mouseleave', ()=> reset(link));
        link.addEventListener('blur', ()=> reset(link));
      });
    })();
    </script>
