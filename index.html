<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Hubin — Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
        <div class="header-right">
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌓</button>
        </div>
      </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
      <a href="industrial-design.html">Industrial Design</a>
      <a href="engineering.html">Engineering</a>
      <a href="fabrication.html">Fabrication</a>
      <a href="fine-arts.html">Fine Arts</a>
    </nav>

    <main>
      <section class="hero">
        <div class="hero-inner container">
          <div class="hero-left"></div>
          <div class="hero-right">
            <!-- hero action removed to keep even spacing; images begin below category bar -->
          </div>
        </div>
      </section>

      <section class="portfolio container" aria-label="Selected projects">
        <div class="grid">
          <a class="tile tile--large" href="industrial-design.html#proj-id-1">
            <img src="https://via.placeholder.com/1400x900?text=Project+A" alt="Project A">
            <span class="tile-label">Product Concept — Industrial Design</span>
          </a>

          <a class="tile tile--medium" href="engineering.html#proj-id-2">
            <img src="https://via.placeholder.com/900x700?text=Project+B" alt="Project B">
            <span class="tile-label">Mechanism Study — Engineering</span>
          </a>

          <a class="tile tile--small" href="fabrication.html#proj-id-3">
            <img src="https://via.placeholder.com/600x500?text=Project+C" alt="Project C">
            <span class="tile-label">Prototype — Fabrication</span>
          </a>

          <a class="tile tile--medium" href="fine-arts.html#proj-id-4">
            <img src="https://via.placeholder.com/900x700?text=Project+D" alt="Project D">
            <span class="tile-label">Sculpture — Fine Arts</span>
          </a>

          <a class="tile tile--small" href="industrial-design.html#proj-id-5">
            <img src="https://via.placeholder.com/600x500?text=Project+E" alt="Project E">
            <span class="tile-label">Study — Industrial</span>
          </a>

          <a class="tile tile--small" href="engineering.html#proj-id-6">
            <img src="https://via.placeholder.com/600x500?text=Project+F" alt="Project F">
            <span class="tile-label">Detail — Engineering</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Connor Hubin. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
    <script>
    (function(){
      const colors=['#e11a1a','#ffd400','#0066ff'];
      function applyRandom(el){ el.style.color = colors[Math.floor(Math.random()*colors.length)]; }
      function reset(el){ el.style.color = ''; }
      document.addEventListener('DOMContentLoaded', () => {
        const link = document.querySelector('.site-name a');
        if(!link) return;
        link.style.cursor='pointer';
        link.addEventListener('mouseenter', ()=> applyRandom(link));
        link.addEventListener('focus', ()=> applyRandom(link));
        link.addEventListener('mouseleave', ()=> reset(link));
        link.addEventListener('blur', ()=> reset(link));
      });
    })();
    </script>
  </body>
</html>
