<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Hubin — Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=20260227-49">
    <style>
      body[data-page="home"] {
        background: #fafaf8;
      }
      
      .hero-project {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px 120px;
      }
      
      .hero-project-wrapper {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: end;
      }
      
      .hero-project-image a {
        display: block;
        text-decoration: none;
        transition: opacity 0.3s ease;
      }
      
      .hero-project-image a:hover {
        opacity: 0.95;
      }
      
      .hero-project-image img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      
      .hero-project-text {
        font-size: 80px;
        font-weight: 700;
        letter-spacing: -2px;
        color: #1a1a1a;
        line-height: 1.1;
        padding-bottom: 20px;
        display: flex;
        flex-direction: column;
      }
      
      .projects-button {
        display: inline-block;
        margin-top: 12px;
        padding: 14px 32px;
        background: #1a1a1a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        border-radius: 8px;
        transition: background 0.3s ease, transform 0.2s ease;
        border: none;
        cursor: pointer;
        width: fit-content;
      }
      
      .projects-button:hover {
        background: #333;
        transform: translateY(-2px);
      }
      
      @media (max-width: 1024px) {
        .hero-project-wrapper {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        
        .hero-project-text {
          font-size: 60px;
          padding-bottom: 0;
        }
      }
      
      @media (max-width: 768px) {
        .hero-project {
          min-height: auto;
          padding: 40px 20px 80px;
        }
        
        .hero-project-text {
          font-size: 48px;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <main>
      <section class="hero-project" aria-label="Featured project">
        <div class="hero-project-wrapper">
          <div class="hero-project-image">
            <a href="project-a-detail.html">
              <img src="assets/images/project-a-dimmed-bg.jpg" alt="Project A">
            </a>
          </div>
          <div class="hero-project-text">
            CTE Pack
            <a href="portfolio-wheel.html?v=430ba9b" class="projects-button">Projects</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Connor Hubin. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
