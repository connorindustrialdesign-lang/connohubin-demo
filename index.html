<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Hubin — Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      body[data-page="home"] {
        background: #fafaf8;
        padding-top: calc(88px + 64px);
      }

      body[data-page="home"] .category-bar {
        top: 88px !important;
        position: fixed !important;
        z-index: 1002 !important;
      }
      
      .hero-project {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 60px 20px 120px;
      }
      
      .hero-project-wrapper {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 80px;
        align-items: stretch;
      }
      
      .hero-project-text-button {
        display: flex;
        flex-direction: column;
        width: 100%;
        justify-content: flex-start;
      }
      
      .hero-project-text {
        flex: 0 0 auto;
        margin-bottom: 0;
      }
      
      .gallery-caption {
        font-size: 18px;
        color: #444;
        line-height: 1.6;
        font-weight: 700;
        letter-spacing: 1.2px;
        max-width: 280px;
        margin-top: auto;
        margin-bottom: 0;
      }
      
      .hero-project-button-col {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        margin-top: 16px;
        flex: 0 0 auto;
      }
      
      .hero-project-image a {
        display: block;
        text-decoration: none;
        transition: opacity 0.3s ease;
      }
      
      .hero-project-image a:hover {
        opacity: 0.95;
      }
      
      .hero-project-image img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      
      .hero-project-text {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -2px;
        color: #1a1a1a;
        line-height: 1.1;
        padding-bottom: 0;
        display: flex;
        flex-direction: column;
      }
      

      .projects-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 22px 48px;
        background: #1a1a1a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: 0.5px;
        border-radius: 8px;
        transition: background 0.3s ease, transform 0.2s ease;
        border: none;
        cursor: pointer;
        width: fit-content;
        margin-top: 0;
      }
      
      .projects-button:hover {
        background: #333;
        transform: translateY(-2px);
      }
      
      @media (max-width: 1024px) {
        .hero-project-wrapper {
          grid-template-columns: 1fr;
          gap: 40px;
          align-items: center;
        }
        
        .hero-project-text {
          font-size: 48px;
          padding-bottom: 0;
        }
        
        .hero-project-button-col {
          justify-content: flex-start;
        }
      }
      
      @media (max-width: 768px) {
        .hero-project {
          min-height: auto;
          padding: 40px 20px 80px;
        }
        
        .hero-project-text {
          font-size: 40px;
        }
        
        .projects-button {
          font-size: 18px;
          padding: 18px 42px;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
        <nav class="header-nav">
          <a href="about.html" class="nav-about" title="Details">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10.5"/>
              <circle cx="12" cy="8" r="1.5"/>
              <path d="M12 11v6"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
      <a href="portfolio-wheel.html#industrial-design">Industrial Design</a>
      <a href="portfolio-wheel.html#engineering">Engineering</a>
      <a href="portfolio-wheel.html#fabrication">Fabrication</a>
      <a href="portfolio-wheel.html#fine-arts">Fine Arts</a>
    </nav>

    <main>
      <section class="hero-project" aria-label="Featured project">
        <div class="hero-project-wrapper">
          <div class="hero-project-image">
            <a href="project-a-detail.html">
              <img src="assets/images/Carte/carte fake front.jpeg" alt="Project A">
            </a>
          </div>
          <div class="hero-project-text-button">
            <div class="hero-project-text">
              CTE Pack
            </div>
            <div class="gallery-caption">Sandblast 0.5" &amp; 0.25" plywood, zinc fasteners, nylon, and 0.125" cork sheet</div>
            <div class="hero-project-button-col">
              <a href="portfolio-wheel.html#industrial-design" class="projects-button">Portfolio</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Connor Hubin. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
