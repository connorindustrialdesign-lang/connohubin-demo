<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Hubin — Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=20260227-49">
    <style>
      body[data-page="home"] {
        background: #fafaf8;
      }
      
      .hero-project {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px 120px;
      }
      
      .hero-project-wrapper {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: end;
      }
      
      .hero-project-image a {
        display: block;
        text-decoration: none;
        transition: opacity 0.3s ease;
      }
      
      .hero-project-image a:hover {
        opacity: 0.95;
      }
      
      .hero-project-image img {
        width: 100%;
        height: auto;
        display: block;
      }
      
      .hero-project-text {
        font-size: 80px;
        font-weight: 700;
        letter-spacing: -2px;
        color: #1a1a1a;
        line-height: 1.1;
        padding-bottom: 20px;
      }
      
      @media (max-width: 1024px) {
        .hero-project-wrapper {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        
        .hero-project-text {
          font-size: 60px;
          padding-bottom: 0;
        }
      }
      
      @media (max-width: 768px) {
        .hero-project {
          min-height: auto;
          padding: 40px 20px 80px;
        }
        
        .hero-project-text {
          font-size: 48px;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
        <nav class="header-nav">
          <a href="about.html" class="nav-about" title="About Connor Hubin">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10.5"/>
              <circle cx="12" cy="8" r="1.5"/>
              <path d="M12 11v6"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
      <a href="industrial-design.html">Industrial Design</a>
      <a href="engineering.html">Engineering</a>
      <a href="fabrication.html">Fabrication</a>
      <a href="fine-arts.html">Fine Arts</a>
    </nav>

    <main>
      <section class="hero-project" aria-label="Featured project">
        <div class="hero-project-wrapper">
          <div class="hero-project-image">
            <a href="project-a-detail.html">
              <img src="assets/images/project-a-nobg.png" alt="Project A">
            </a>
          </div>
          <div class="hero-project-text">
            CTE Pack
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Connor Hubin. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
