    <style>
      .portfolio-wrap { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }
      .portfolio-header { text-align: center; margin-bottom: 50px; }
      .portfolio-header h1 { font-size: 42px; margin: 0 0 12px 0; font-weight: 700; }
      .portfolio-header p { font-size: 18px; color: var(--muted); margin: 0 0 20px 0; }
      .back-link { display: inline-block; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 6px; font-size: 14px; transition: background 0.3s; margin-bottom: 40px; }
      .back-link:hover { background: #333; }
      
      .drawings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .drawing-item { aspect-ratio: 3 / 4; background: #f5f5f5; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
      .drawing-item:hover { transform: scale(1.02); }
      .drawing-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
      
      @media (max-width: 1200px) { .drawings-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 900px) { .drawings-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 600px) { .drawings-grid { grid-template-columns: 1fr; } }
