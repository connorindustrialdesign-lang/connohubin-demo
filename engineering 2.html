<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engineering — Connor Hubin</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .category-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }
      .category-wrap h2 { margin: 0 0 8px; position: absolute; left: -9999px; }
      .category-wrap p { margin: 0 0 28px; color: var(--muted); position: absolute; left: -9999px; }
      .cat-grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
      .cat-card { border-radius: 12px; min-height: 200px; display: block; overflow: hidden; text-decoration: none; color: inherit; position: relative; }
      .cat-card:not(.shope-project) img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .cat-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: #fff; font-weight: 700; font-size: 18px; }
      .cat-card.placeholder { display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .08em; }
      .cat-card.design-project { min-height: 340px; background-image: url('assets/images/engineering 1 & 2/heroselection-background-display.jpg'); background-size: cover; background-position: center; }
      .cat-card.design-project::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
      .cat-card.design-project .design-project-title { position: relative; z-index: 1; display: block; padding: 22px; text-align: center; color: #fff; font-size: clamp(34px, 5vw, 62px); line-height: 1.05; font-weight: 900; text-transform: none; letter-spacing: 0.01em; text-shadow: 0 4px 20px rgba(0,0,0,0.35); }
      .cat-card.shope-project { display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 340px; background: linear-gradient(135deg, #eeeeee 0%, #dcdcdc 100%); border: 1px solid #d1d1d1; padding: 10px; }
      .cat-card.shope-project:hover { text-decoration: none; background: linear-gradient(135deg, #e7e7e7 0%, #d2d2d2 100%); border-color: #bdbdbd; }
      .shope-project-content { display: flex; align-items: center; justify-content: center; gap: 18px; flex: 1; flex-wrap: nowrap; }
      .cat-card.shope-project .shope-project-logo { width: 500px; height: auto; max-width: 100%; object-fit: contain; flex-shrink: 1; image-rendering: auto; }
      .shope-project-icon { width: 208px; height: 242px; flex-shrink: 0; }
      .shope-project-title { font-size: 16px; font-weight: 700; color: #2c3e50; }
      .g1 { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); }
      .g2 { background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%); }
      @media (max-width: 760px) { 
        .cat-grid { grid-template-columns: 1fr; }
        .shope-project-content { flex-direction: column; gap: 16px; justify-content: center; }
        .cat-card.shope-project { min-height: 300px; padding: 14px; }
        .cat-card.shope-project .shope-project-logo { width: 290px; }
        .shope-project-icon { width: 150px; height: 175px; }
        .cat-card.design-project { min-height: 280px; }
        .cat-card.design-project .design-project-title { font-size: clamp(28px, 9vw, 46px); padding: 18px; }
      }
    </style>
  </head>
  <body data-page="engineering">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
        <nav class="header-nav">
          <a href="about.html" class="nav-about" title="Details">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10.5"/>
              <circle cx="12" cy="8" r="1.5"/>
              <path d="M12 11v6"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
      <a href="industrial-design.html">Industrial Design</a>
      <a href="engineering.html">Engineering</a>
      <a href="fabrication.html">Fabrication</a>
      <a href="fine-arts.html">Fine Arts</a>
    </nav>

    <main class="category-wrap">
      <h2>Engineering</h2>
      <p>Two placeholder project slots (names/images coming soon).</p>

      <section class="cat-grid">
        <a class="cat-card shope-project" href="shope-concrete-detail.html">
          <div class="shope-project-content">
            <img src="assets/images/shope/company/Header-Logo-display.png" srcset="assets/images/shope/company/Header-Logo-display@2x.png 2x" alt="Shope Concrete Products" class="shope-project-logo">
            <svg class="shope-project-icon" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
              <!-- Ground surface line -->
              <line x1="10" y1="100" x2="190" y2="100" stroke="#4a4a4a" stroke-width="2.5"/>
              <!-- Ground fill pattern -->
              <rect x="10" y="100" width="180" height="15" fill="#888" opacity="0.25"/>
              <!-- Casting cover/lid (typical cast iron) -->
              <rect x="45" y="75" width="110" height="25" rx="3" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
              <!-- Casting detail lines -->
              <line x1="60" y1="75" x2="60" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
              <line x1="80" y1="75" x2="80" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
              <line x1="100" y1="75" x2="100" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
              <line x1="120" y1="75" x2="120" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
              <line x1="140" y1="75" x2="140" y2="100" stroke="#555" stroke-width="1" opacity="0.7"/>
              <!-- Concrete barrel/shaft walls -->
              <rect x="55" y="100" width="90" height="130" fill="none" stroke="#3a3a3a" stroke-width="2.5"/>
              <!-- Barrel interior (lighter) -->
              <rect x="58" y="103" width="84" height="124" fill="#1a1a1a" opacity="0.3"/>
              <!-- Incoming pipe/inlet (left side) -->
              <rect x="30" y="150" width="25" height="18" rx="2" fill="none" stroke="#2a2a2a" stroke-width="2.2"/>
              <line x1="30" y1="159" x2="55" y2="159" stroke="#2a2a2a" stroke-width="2"/>
              <!-- Internal inverted sump cone (typical in manholes) -->
              <polygon points="58,220 142,220 100,235" fill="none" stroke="#555" stroke-width="1.5" opacity="0.6"/>
              <!-- Water level line -->
              <line x1="60" y1="185" x2="140" y2="185" stroke="#5B8FD4" stroke-width="2" opacity="0.75"/>
              <!-- Depth marking lines -->
              <line x1="48" y1="130" x2="52" y2="130" stroke="#666" stroke-width="1" opacity="0.5"/>
              <line x1="48" y1="160" x2="52" y2="160" stroke="#666" stroke-width="1" opacity="0.5"/>
              <line x1="48" y1="190" x2="52" y2="190" stroke="#666" stroke-width="1" opacity="0.5"/>
            </svg>
          </div>
        </a>
        <a class="cat-card placeholder design-project" href="engineering-design-1-2-detail.html">
          <span class="design-project-title">Engineering Design 1 &amp; 2</span>
        </a>
      </section>

      <section class="category-flow">
        <a href="fabrication.html" class="flow-link">Next: Fabrication →</a>
      </section>

      </div>
    </footer>
