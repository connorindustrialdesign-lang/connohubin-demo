    <link rel="stylesheet" href="styles.css" />
    <style>
      .category-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }
      .category-wrap h2 { margin: 0 0 8px; position: absolute; left: -9999px; }
      .category-wrap p { margin: 0 0 28px; color: var(--muted); position: absolute; left: -9999px; }
      .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; }
      .cat-card { display: block; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; background: #f2f2f2; position: relative; }
      .cat-card:first-child { grid-column: 1 / -1; }
      .cat-card img { width: 100%; height: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; }
      .cat-card:first-child img { aspect-ratio: 16 / 9; }
      .cat-card .placeholder-img { width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 18px; }
      .cat-card.grad1 .placeholder-img { background: linear-gradient(135deg, #C97171 0%, #d98989 100%); }
      .cat-card.grad2 .placeholder-img { background: linear-gradient(135deg, #d98989 0%, #e5a1a1 100%); }
      .cat-card.grad3 .placeholder-img { background: linear-gradient(135deg, #e5a1a1 0%, #f0b8b8 100%); }
      .cat-label { padding: 12px 10px; font-weight: 700; }
      @media (max-width: 768px) {
        .cat-grid { grid-template-columns: 1fr; }
        .cat-card:first-child { grid-column: 1; }
      }
    </style>
  </head>
