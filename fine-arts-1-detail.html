<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Arts Project 1 - Connor's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .painting-gallery {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 120px 40px;
            background: #fafaf8;
        }

        .painting-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .painting-container {
            background: white;
            padding: 60px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.15);
            max-width: 700px;
            width: 100%;
        }

        .painting-image {
            width: 100%;
            height: auto;
            display: block;
            background: linear-gradient(135deg, #355c7d 0%, #6c5b7b 50%, #c06c84 100%);
            aspect-ratio: 1;
            border-radius: 4px;
        }

        .gallery-label {
            margin-top: 40px;
            text-align: center;
            max-width: 600px;
        }

        .gallery-label h2 {
            font-size: 24px;
            margin: 0 0 8px 0;
            font-weight: 700;
            color: #1a1a1a;
        }

        .gallery-label p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        .project-gallery {
            display: none;
        }

        .project-header p {
            display: none;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .painting-gallery {
                padding: 100px 30px;
                min-height: auto;
            }

            .painting-container {
                padding: 50px;
                max-width: 500px;
            }

            .painting-image {
                aspect-ratio: 0.9;
            }

            .gallery-label h2 {
                font-size: 22px;
            }

            .gallery-label p {
                font-size: 14px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .painting-gallery {
                padding: 80px 20px;
                min-height: auto;
            }

            .painting-container {
                padding: 40px;
            }

            .gallery-label h2 {
                font-size: 20px;
            }

            .gallery-label p {
                font-size: 13px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            .painting-gallery {
                padding: 60px 16px;
            }

            .painting-container {
                padding: 24px;
            }

            .painting-image {
                aspect-ratio: 0.85;
            }

            .gallery-label {
                margin-top: 24px;
            }

            .gallery-label h2 {
                font-size: 18px;
                margin-bottom: 8px;
            }

            .gallery-label p {
                font-size: 12px;
                line-height: 1.5;
            }
        }
    </style>
</head>
<body data-page="fine-arts">
    <header class="site-header">
        <div class="header-inner container">
            <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
            <nav class="header-nav">
                <a href="about.html" class="nav-about" title="Details">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10.5"/>
                        <circle cx="12" cy="8" r="1.5"/>
                        <path d="M12 11v6"/>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
        <a href="portfolio-wheel.html#industrial-design">Industrial Design</a>
        <a href="portfolio-wheel.html#engineering">Engineering</a>
        <a href="portfolio-wheel.html#fabrication">Fabrication</a>
        <a href="portfolio-wheel.html#fine-arts">Fine Arts</a>
    </nav>

    <div class="project-header">

        <h1>CTE Pack</h1>
        <p>Artistic exploration</p>
    </div>

    <div class="painting-gallery">
        <div class="painting-frame">
            <div class="painting-container">
                <div class="painting-image"></div>
            </div>
            <div class="gallery-label">
                <h2>CTE Pack</h2>
                <p>Sandblast 0.5" &amp; 0.25" plywood, zinc fasteners, nylon, and 0.125" cork sheet</p>
            </div>
        </div>
    </div>

    <div class="project-gallery">
        <div class="gallery-item placeholder"><div>Image 1</div></div>
        <div class="gallery-item placeholder"><div>Image 2</div></div>
        <div class="gallery-item placeholder"><div>Image 3</div></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
