    <script src="script.js"></script>
    <script>
      // Scroll detection for category bar highlighting
      function updateCategoryBar() {
        const sections = document.querySelectorAll('[data-category]');
        const categoryLinks = document.querySelectorAll('.category-bar [data-category]');
        
        let currentCategory = 'industrial-design';
        
        sections.forEach(section => {
          const rect = section.getBoundingClientRect();
          // If section is in upper half of viewport, mark as current
          if (rect.top <= window.innerHeight / 2) {
            currentCategory = section.getAttribute('data-category');
          }
        });
        
        categoryLinks.forEach(link => {
          link.classList.remove('active');
          if (link.getAttribute('data-category') === currentCategory) {
            link.classList.add('active');
          }
        });
      }
      
      window.addEventListener('scroll', updateCategoryBar);
      document.addEventListener('DOMContentLoaded', updateCategoryBar);
    </script>
